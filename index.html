<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#5f9f2f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>First Kirill Game</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="splash-screen" id="splashScreen">
    <div class="splash-glow"></div>
    <div class="splash-content">
      <div class="splash-kicker">debut edition</div>
      <h1 class="splash-title">FIRST KIRILL GAME</h1>
      <p class="splash-subtitle">Snake made for phone play</p>
    </div>
  </div>

  <main class="app">
    <section class="topbar">
      <div class="brand">
        <div class="brand-title">First Kirill Game</div>
        <div class="brand-subtitle">Snake web version</div>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat">
          <span class="label">Best</span>
          <strong id="best">0</strong>
        </div>
      </div>
    </section>

    <section class="board-wrap">
      <canvas id="game" width="360" height="360" aria-label="Game board"></canvas>
      <div class="overlay" id="overlay">
        <p class="overlay-badge">Swipe controls</p>
        <h2 id="overlayTitle">Snake</h2>
        <p id="overlayText">Eat apples, grow longer and stay away from walls.</p>
        <button id="startButton" class="primary-button">Play</button>
      </div>
    </section>

    <section class="actions">
      <button id="restartButton" class="secondary-button">Restart</button>
      <p class="hint">Swipe on the field or use the buttons below</p>
    </section>

    <section class="controls" aria-label="Controls">
      <button class="control control-up" data-dir="up" aria-label="Up">▲</button>
      <button class="control control-left" data-dir="left" aria-label="Left">◀</button>
      <button class="control control-right" data-dir="right" aria-label="Right">▶</button>
      <button class="control control-down" data-dir="down" aria-label="Down">▼</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
